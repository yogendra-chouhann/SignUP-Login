<!DOCTYPE html>

<body>
    <div class="signup">
        <h1>Login</h1>
        <form action="" onsubmit="handleLogin(event)">
            <h4>Email :</h4>
            <input type="email" id="email" placeholder="Enter Your Email">
            <br>
             <h4>Password :</h4>
             <input type="password" id="password" placeholder="Enter Your Password">
            <button type="submit"> Login </button>
        </form>
    </div>

    
</body>
